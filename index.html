<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skincare">
<meta name="theme-color" content="#0a0f1a">
<title>Skincare Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0f1a;color:#e2e8f0;font-family:-apple-system,'Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;-webkit-appearance:none;}
input{font-family:inherit;-webkit-appearance:none;}
#app{max-width:430px;margin:0 auto;padding:16px 16px 100px;padding-top:max(16px,env(safe-area-inset-top));}
.toast-el{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#1e293b;border:1px solid rgba(255,255,255,0.15);border-radius:12px;
  padding:10px 20px;font-size:13px;color:#f8fafc;font-weight:600;z-index:999;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);transition:transform 0.3s ease;pointer-events:none;}
.toast-el.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-el" id="toastEl"></div>
<script>
(function(){
"use strict";

var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
var MSHORT=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var WDAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

var TYPES={PREP:"prep",NEEDLE:"needle",RECOVERY:"recovery",TRET:"tret",AZELAIC:"azelaic"};
var META={};
META[TYPES.NEEDLE]={label:"Microneedling",color:"#ff4757",icon:"\uD83D\uDC89",short:"Needle"};
META[TYPES.PREP]={label:"Prep Day",color:"#ffa502",icon:"\u23F8",short:"Prep"};
META[TYPES.RECOVERY]={label:"Recovery",color:"#ff6348",icon:"\uD83D\uDEE1",short:"Recover"};
META[TYPES.TRET]={label:"Tretinoin Night",color:"#1e90ff",icon:"\uD83D\uDCA7",short:"Tret"};
META[TYPES.AZELAIC]={label:"Azelaic Night",color:"#a55eea",icon:"\u2728",short:"Azelaic"};

var DEF_ROUTINES={};
DEF_ROUTINES[TYPES.TRET]={
  am:["Cleanser","Naruko Tea Tree Toner","Neogence HA Essence","Celimax Pore + Dark Spot","AHC Pro Shot Bright","CeraVe Moisturizing Cream","Heliocare Sunscreen"],
  pm:["Cleanser","Naruko Tea Tree Toner","Neogence HA Essence","Tretinoin 0.05%","CeraVe Moisturizing Cream"],
  note:"Tretinoin night \u2014 avoid sun exposure tomorrow"
};
DEF_ROUTINES[TYPES.AZELAIC]={
  am:["Cleanser","Naruko Tea Tree Toner","Neogence HA Essence","Celimax Pore + Dark Spot","AHC Pro Shot Bright","CeraVe Moisturizing Cream","Heliocare Sunscreen"],
  pm:["Cleanser","Naruko Tea Tree Toner","Ba Luan Azelaic Acid 15%","Copper Peptide + PDRN Serum","CeraVe Moisturizing Cream"],
  note:"Azelaic acid + copper peptide night"
};
DEF_ROUTINES[TYPES.PREP]={
  am:["Cleanser","Naruko Tea Tree Toner","Neogence HA Essence","CeraVe Moisturizing Cream","Heliocare Sunscreen"],
  pm:["Cleanser","Neogence HA Essence","CeraVe Moisturizing Cream"],
  note:"No actives \u2014 prepping skin for microneedling"
};
DEF_ROUTINES[TYPES.NEEDLE]={
  am:["Cleanser","Neogence HA Essence","CeraVe Moisturizing Cream","Heliocare Sunscreen (if going out)"],
  pm:["Cleanser","Neogence HA Essence","Copper Peptide + PDRN Serum","CeraVe Moisturizing Cream"],
  note:"Microneedling night (0.25\u20130.5mm) \u2014 apply HA during session, copper peptide after"
};
DEF_ROUTINES[TYPES.RECOVERY]={
  am:["Cleanser","Neogence HA Essence","CeraVe Moisturizing Cream","Heliocare Sunscreen"],
  pm:["Cleanser","Neogence HA Essence","Copper Peptide + PDRN Serum","CeraVe Moisturizing Cream"],
  note:"Recovery \u2014 hydration and healing only"
};

// STATE
var S={
  screen:"calendar",year:new Date().getFullYear(),month:new Date().getMonth(),
  selDay:null,completed:{},routines:null,streak:{},
  reminders:{amOn:false,amTime:"07:00",pmOn:false,pmTime:"21:00"},
  editType:null,editPeriod:"am",editItems:[],newItem:""
};

// STORAGE
function ld(k,fb){try{var v=localStorage.getItem("sk3_"+k);return v?JSON.parse(v):fb;}catch(e){return fb;}}
function sv(k,v){try{localStorage.setItem("sk3_"+k,JSON.stringify(v));}catch(e){}}

function initState(){
  S.completed=ld("completed",{});
  S.routines=ld("routines",JSON.parse(JSON.stringify(DEF_ROUTINES)));
  S.streak=ld("streak",{});
  S.reminders=ld("reminders",{amOn:false,amTime:"07:00",pmOn:false,pmTime:"21:00"});
}

// SCHEDULE: Every Friday = needle, Thursday = prep, Saturday = recovery, rest alternate tret/azelaic
function buildSch(y,m){
  var dim=new Date(y,m+1,0).getDate();
  var sch={};
  // Mark all Fridays as needle, Thursdays as prep, Saturdays as recovery
  for(var d=1;d<=dim;d++){
    var dow=new Date(y,m,d).getDay(); // 0=Sun,1=Mon,...5=Fri,6=Sat
    if(dow===5) sch[d]=TYPES.NEEDLE;      // Friday
    else if(dow===4) sch[d]=TYPES.PREP;    // Thursday
    else if(dow===6) sch[d]=TYPES.RECOVERY;// Saturday
  }
  // Fill remaining (Sun, Mon, Tue, Wed) with alternating tret/azelaic
  var t=true;
  for(var d=1;d<=dim;d++){
    if(!sch[d]){
      sch[d]=t?TYPES.TRET:TYPES.AZELAIC;
      t=!t;
    }
  }
  return sch;
}

function dkey(y,m,d){return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");}
function todayDk(){var t=new Date();return dkey(t.getFullYear(),t.getMonth(),t.getDate());}
function isTd(d){var t=new Date();return d===t.getDate()&&S.month===t.getMonth()&&S.year===t.getFullYear();}

function getStreak(){
  var c=0,d=new Date();d.setDate(d.getDate()-1);
  while(S.streak[dkey(d.getFullYear(),d.getMonth(),d.getDate())]){c++;d.setDate(d.getDate()-1);}
  if(S.streak[todayDk()])c++;
  return c;
}

var toastTm;
function toast(msg){
  var el=document.getElementById("toastEl");el.textContent=msg;el.classList.add("show");
  clearTimeout(toastTm);toastTm=setTimeout(function(){el.classList.remove("show");},2200);
}

// DOM HELPERS
function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs){
    for(var k in attrs){
      if(k==="style"&&typeof attrs[k]==="object"){Object.assign(e.style,attrs[k]);}
      else if(k.substring(0,2)==="on"){e[k]=attrs[k];}
      else if(k==="className"){e.className=attrs[k];}
      else{e.setAttribute(k,attrs[k]);}
    }
  }
  if(children){
    if(!Array.isArray(children))children=[children];
    children.forEach(function(c){
      if(c==null)return;
      if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
  }
  return e;
}

function btn(label,onclick,style){
  var b=el("button",{onclick:onclick,style:style});
  if(typeof label==="string")b.appendChild(document.createTextNode(label));
  else if(label)b.appendChild(label);
  return b;
}

// RENDER
function render(){
  var app=document.getElementById("app");
  app.innerHTML="";
  if(S.editType){renderEdit(app);return;}
  if(S.screen==="detail"&&S.selDay){renderDetail(app);return;}
  if(S.screen==="settings"){renderSettings(app);return;}
  if(S.screen==="streak"){renderStreak(app);return;}
  renderCalendar(app);
}

// CALENDAR
function renderCalendar(app){
  var sch=buildSch(S.year,S.month);
  var fd=(new Date(S.year,S.month,1).getDay()+6)%7;
  var dim=new Date(S.year,S.month+1,0).getDate();
  var streak=getStreak();
  var now=new Date();
  var todaySch=buildSch(now.getFullYear(),now.getMonth());
  var todayType=todaySch[now.getDate()];
  var todayM=META[todayType];

  // Header
  var hdr=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"16px"}});
  var hdrL=el("div");
  hdrL.appendChild(el("h1",{style:{fontSize:"24px",fontWeight:"800",color:"#f8fafc",letterSpacing:"-0.5px"}},["Skincare"]));
  hdrL.appendChild(el("p",{style:{fontSize:"11px",color:"#475569",marginTop:"2px",textTransform:"uppercase",letterSpacing:"1.5px"}},["Weekly Friday Needling"]));
  hdr.appendChild(hdrL);

  var hdrR=el("div",{style:{display:"flex",gap:"8px"}});
  if(streak>0){
    hdrR.appendChild(btn("\uD83D\uDD25 "+streak,function(){S.screen="streak";render();},{
      height:"36px",borderRadius:"10px",background:"rgba(255,71,87,0.12)",
      border:"1px solid rgba(255,71,87,0.3)",fontSize:"13px",color:"#ff4757",fontWeight:"700",padding:"0 12px",
      display:"flex",alignItems:"center"
    }));
  }
  hdrR.appendChild(btn("\u2699\uFE0F",function(){S.screen="settings";render();},{
    width:"36px",height:"36px",borderRadius:"10px",background:"rgba(255,255,255,0.06)",
    border:"1px solid rgba(255,255,255,0.08)",fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center"
  }));
  hdr.appendChild(hdrR);
  app.appendChild(hdr);

  // Today card
  var tc=el("button",{onclick:function(){goToToday();},style:{
    width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",
    background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",
    borderRadius:"14px",padding:"14px 16px",marginBottom:"20px"
  }});
  var tcL=el("div",{style:{display:"flex",alignItems:"center",gap:"10px"}});
  tcL.appendChild(el("div",{style:{width:"40px",height:"40px",borderRadius:"10px",background:"rgba(255,255,255,0.06)",
    display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px"}},[todayM.icon]));
  var tcT=el("div",{style:{textAlign:"left"}});
  tcT.appendChild(el("div",{style:{fontSize:"13px",fontWeight:"700",color:"#f8fafc"}},["Today's Routine"]));
  tcT.appendChild(el("div",{style:{fontSize:"11px",color:"#94a3b8"}},[todayM.label]));
  tcL.appendChild(tcT);
  tc.appendChild(tcL);
  tc.appendChild(el("span",{style:{color:"#475569",fontSize:"18px"}},["→"]));
  app.appendChild(tc);

  // Week pattern info
  var info=el("div",{style:{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:"10px",padding:"10px 14px",marginBottom:"16px",fontSize:"11px",color:"#64748b",lineHeight:"1.6"}});
  info.appendChild(document.createTextNode("Thu \u2192 Prep (no actives) \u2022 Fri \u2192 Needle (0.25\u20130.5mm) \u2022 Sat \u2192 Recovery \u2022 Sun\u2013Wed \u2192 Tret / Azelaic"));
  app.appendChild(info);

  // Month nav
  var nav=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px",padding:"0 2px"}});
  nav.appendChild(btn("\u2039",function(){prevMonth();},{
    width:"34px",height:"34px",borderRadius:"8px",background:"rgba(255,255,255,0.05)",
    border:"1px solid rgba(255,255,255,0.08)",color:"#94a3b8",fontSize:"20px",
    display:"flex",alignItems:"center",justifyContent:"center"
  }));
  nav.appendChild(el("span",{style:{fontSize:"16px",fontWeight:"600"}},[MONTHS[S.month]+" "+S.year]));
  nav.appendChild(btn("\u203A",function(){nextMonth();},{
    width:"34px",height:"34px",borderRadius:"8px",background:"rgba(255,255,255,0.05)",
    border:"1px solid rgba(255,255,255,0.08)",color:"#94a3b8",fontSize:"20px",
    display:"flex",alignItems:"center",justifyContent:"center"
  }));
  app.appendChild(nav);

  // Day headers
  var dhdr=el("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px",marginBottom:"4px"}});
  WDAYS.forEach(function(d){
    dhdr.appendChild(el("div",{style:{textAlign:"center",fontSize:"10px",
      color:d==="Fri"?"#ff4757":d==="Thu"?"#ffa502":d==="Sat"?"#ff6348":"#475569",
      fontWeight:"700",textTransform:"uppercase",letterSpacing:"1px",padding:"4px 0"}},[d]));
  });
  app.appendChild(dhdr);

  // Grid
  var grid=el("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px"}});
  for(var i=0;i<fd;i++)grid.appendChild(el("div"));
  for(var d=1;d<=dim;d++){
    (function(day){
      var type=sch[day];var m=META[type];var key=dkey(S.year,S.month,day);
      var done=S.streak[key];var td=isTd(day);
      var cell=el("button",{onclick:function(){S.selDay=day;S.screen="detail";render();},style:{
        borderRadius:"9px",padding:"5px 2px",display:"flex",flexDirection:"column",alignItems:"center",
        gap:"1px",minHeight:"46px",justifyContent:"center",position:"relative",
        background:done?m.color+"30":m.color+"10",
        border:(td?"2px":"1.5px")+" solid "+(td?"#fff":done?m.color:m.color+"25")
      }});
      cell.appendChild(el("span",{style:{fontSize:"13px",fontWeight:td?"800":"600",color:td?"#fff":"#cbd5e1"}},[String(day)]));
      cell.appendChild(el("span",{style:{fontSize:"10px"}},[m.icon]));
      if(done)cell.appendChild(el("div",{style:{position:"absolute",top:"2px",right:"3px",width:"5px",height:"5px",borderRadius:"50%",background:"#10b981"}}));
      grid.appendChild(cell);
    })(d);
  }
  app.appendChild(grid);

  // Legend
  var leg=el("div",{style:{marginTop:"16px",display:"flex",flexWrap:"wrap",gap:"6px",justifyContent:"center"}});
  Object.keys(META).forEach(function(k){
    var m=META[k];
    var item=el("div",{style:{display:"flex",alignItems:"center",gap:"4px",fontSize:"10px",color:"#64748b",
      background:"rgba(255,255,255,0.03)",borderRadius:"6px",padding:"3px 7px"}});
    item.appendChild(el("div",{style:{width:"6px",height:"6px",borderRadius:"50%",background:m.color,flexShrink:"0"}}));
    item.appendChild(el("span",null,[m.icon+" "+m.short]));
    leg.appendChild(item);
  });
  app.appendChild(leg);

  if(streak>0){
    app.appendChild(btn("\uD83D\uDD25 "+streak+" day streak \u2014 keep it going!",function(){S.screen="streak";render();},{
      width:"100%",marginTop:"16px",padding:"12px",borderRadius:"10px",
      background:"rgba(255,71,87,0.08)",border:"1px solid rgba(255,71,87,0.2)",
      color:"#ff4757",fontSize:"13px",fontWeight:"600",textAlign:"center"
    }));
  }
}

// DETAIL
function renderDetail(app){
  var sch=buildSch(S.year,S.month);
  var type=sch[S.selDay];var meta=META[type];var routine=S.routines[type];
  var key=dkey(S.year,S.month,S.selDay);

  var hdr=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}});
  hdr.appendChild(btn("\u2190 Calendar",function(){S.screen="calendar";render();},{
    background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",
    borderRadius:"8px",color:"#94a3b8",padding:"8px 14px",fontSize:"13px"
  }));
  hdr.appendChild(btn("Edit \u270E",function(){S.editType=type;S.editPeriod="am";S.editItems=routine.am.slice();S.newItem="";render();},{
    background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",
    borderRadius:"8px",color:"#94a3b8",padding:"8px 14px",fontSize:"13px"
  }));
  app.appendChild(hdr);

  var allAmDone=routine.am.every(function(_,i){return S.completed[key+"-am-"+i];});
  var allPmDone=routine.pm.every(function(_,i){return S.completed[key+"-pm-"+i];});
  var dayDone=allAmDone&&allPmDone;

  var banner=el("div",{style:{border:"1px solid "+meta.color+"40",background:meta.color+"10",borderRadius:"14px",padding:"16px",marginBottom:"20px"}});
  var banTop=el("div",{style:{display:"flex",alignItems:"center",gap:"12px"}});
  banTop.appendChild(el("span",{style:{fontSize:"28px"}},[meta.icon]));
  var banInfo=el("div");
  banInfo.appendChild(el("div",{style:{fontSize:"18px",fontWeight:"700",color:meta.color}},[MSHORT[S.month]+" "+S.selDay]));
  banInfo.appendChild(el("div",{style:{fontSize:"13px",color:"#94a3b8"}},[meta.label]));
  banTop.appendChild(banInfo);
  if(dayDone)banTop.appendChild(el("div",{style:{marginLeft:"auto",background:"#10b981",color:"#fff",fontSize:"11px",fontWeight:"700",padding:"4px 10px",borderRadius:"6px"}},["✓ DONE"]));
  banner.appendChild(banTop);
  if(routine.note)banner.appendChild(el("div",{style:{fontSize:"12px",color:"#94a3b8",marginTop:"10px",lineHeight:"1.5",fontStyle:"italic"}},[routine.note]));
  app.appendChild(banner);

  app.appendChild(buildSection("am","\u2600\uFE0F MORNING","#f59e0b",routine.am,key,allAmDone));
  app.appendChild(buildSection("pm","\uD83C\uDF19 EVENING","#818cf8",routine.pm,key,allPmDone));

  app.appendChild(btn("Reset Day",function(){resetDay(key,type);},{
    width:"100%",padding:"12px",borderRadius:"10px",background:"rgba(255,255,255,0.04)",
    border:"1px solid rgba(255,255,255,0.08)",color:"#64748b",fontSize:"13px",marginTop:"8px",textAlign:"center"
  }));
}

function buildSection(period,title,color,items,dayKey,allDone){
  var sec=el("div",{style:{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"12px",padding:"14px",marginBottom:"12px"}});
  var hdr=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}});
  hdr.appendChild(el("span",{style:{color:color,fontWeight:"700",fontSize:"13px"}},[title]));
  if(allDone){
    hdr.appendChild(el("span",{style:{color:"#10b981",fontSize:"12px",fontWeight:"600"}},["Complete \u2713"]));
  }else{
    hdr.appendChild(btn("Mark all \u2713",function(){markAllDone(dayKey,period,items.length);},{
      background:"rgba(16,185,129,0.12)",border:"1px solid rgba(16,185,129,0.3)",
      borderRadius:"6px",color:"#10b981",fontSize:"11px",fontWeight:"600",padding:"4px 10px"
    }));
  }
  sec.appendChild(hdr);
  items.forEach(function(step,i){
    var done=S.completed[dayKey+"-"+period+"-"+i];
    var row=el("button",{onclick:function(){toggleStep(dayKey,period,i);},style:{
      width:"100%",display:"flex",alignItems:"center",gap:"10px",padding:"10px 0",
      borderBottom:"1px solid rgba(255,255,255,0.04)",textAlign:"left"
    }});
    var cb=el("div",{style:{
      width:"22px",height:"22px",borderRadius:"6px",
      border:"2px solid "+(done?"#10b981":"#334155"),
      background:done?"#10b981":"transparent",
      display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:"12px",color:"#fff",fontWeight:"700",flexShrink:"0"
    }},done?["\u2713"]:[]);
    row.appendChild(cb);
    row.appendChild(el("span",{style:{fontSize:"13px",color:done?"#475569":"#cbd5e1",lineHeight:"1.4",
      textDecoration:done?"line-through":"none"}},[step]));
    sec.appendChild(row);
  });
  return sec;
}

// EDIT
function renderEdit(app){
  var meta=META[S.editType];
  var hdr=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}});
  hdr.appendChild(btn("\u2190 Back",function(){S.editType=null;render();},{
    background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",
    borderRadius:"8px",color:"#94a3b8",padding:"8px 14px",fontSize:"13px"
  }));
  hdr.appendChild(el("span",{style:{fontSize:"14px",fontWeight:"700",color:meta.color}},[meta.icon+" Edit "+meta.label]));
  app.appendChild(hdr);

  var tabs=el("div",{style:{display:"flex",gap:"6px",marginBottom:"16px"}});
  ["am","pm"].forEach(function(p){
    var active=S.editPeriod===p;
    tabs.appendChild(btn(p==="am"?"\u2600\uFE0F Morning":"\uD83C\uDF19 Evening",function(){
      S.editPeriod=p;S.editItems=S.routines[S.editType][p].slice();render();
    },{
      flex:"1",padding:"10px",borderRadius:"10px",fontSize:"13px",fontWeight:"600",textAlign:"center",
      background:active?meta.color:"rgba(255,255,255,0.05)",
      color:active?"#fff":"#94a3b8",
      border:"1px solid "+(active?meta.color:"rgba(255,255,255,0.08)")
    }));
  });
  app.appendChild(tabs);

  var list=el("div");
  S.editItems.forEach(function(item,i){
    var row=el("div",{style:{display:"flex",alignItems:"center",gap:"8px",background:"rgba(255,255,255,0.04)",
      border:"1px solid rgba(255,255,255,0.06)",borderRadius:"10px",padding:"8px 12px",marginBottom:"6px"}});
    row.appendChild(el("span",{style:{color:"#475569",fontSize:"11px",fontWeight:"700",minWidth:"16px"}},[String(i+1)]));
    var inp=el("input",{type:"text",value:item,style:{
      flex:"1",background:"transparent",border:"none",color:"#e2e8f0",fontSize:"13px",outline:"none"
    }});
    (function(idx){inp.addEventListener("change",function(){S.editItems[idx]=this.value;});})(i);
    row.appendChild(inp);
    (function(idx){
      row.appendChild(btn("\u2715",function(){S.editItems.splice(idx,1);render();},{
        width:"24px",height:"24px",borderRadius:"6px",background:"rgba(255,71,87,0.1)",
        border:"1px solid rgba(255,71,87,0.2)",color:"#ff4757",fontSize:"12px",
        display:"flex",alignItems:"center",justifyContent:"center"
      }));
    })(i);
    list.appendChild(row);
  });
  app.appendChild(list);

  var addRow=el("div",{style:{display:"flex",gap:"8px",marginTop:"12px"}});
  var addInp=el("input",{type:"text",placeholder:"Add new product...",style:{
    flex:"1",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",
    borderRadius:"10px",padding:"10px 14px",color:"#e2e8f0",fontSize:"13px",outline:"none"
  }});
  addInp.addEventListener("input",function(){S.newItem=this.value;});
  addInp.addEventListener("keydown",function(e){
    if(e.key==="Enter"&&S.newItem.trim()){S.editItems.push(S.newItem.trim());S.newItem="";render();}
  });
  addRow.appendChild(addInp);
  addRow.appendChild(btn("+",function(){
    if(S.newItem.trim()){S.editItems.push(S.newItem.trim());S.newItem="";render();}
  },{width:"42px",borderRadius:"10px",background:meta.color,color:"#fff",fontSize:"20px",
    display:"flex",alignItems:"center",justifyContent:"center"}));
  app.appendChild(addRow);

  app.appendChild(btn("Save Changes",function(){saveRoutineEdit();},{
    width:"100%",padding:"14px",borderRadius:"12px",background:meta.color,
    color:"#fff",fontSize:"15px",fontWeight:"700",marginTop:"20px"
  }));
}

// SETTINGS
function renderSettings(app){
  var hdr=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}});
  hdr.appendChild(btn("\u2190 Back",function(){S.screen="calendar";render();},{
    background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",
    borderRadius:"8px",color:"#94a3b8",padding:"8px 14px",fontSize:"13px"
  }));
  hdr.appendChild(el("span",{style:{fontSize:"15px",fontWeight:"700",color:"#f8fafc"}},["⚙️ Settings"]));
  app.appendChild(hdr);

  // Reminders
  var card1=el("div",{style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"14px",padding:"16px",marginBottom:"12px"}});
  card1.appendChild(el("div",{style:{fontSize:"14px",fontWeight:"700",color:"#f8fafc"}},["Reminders"]));

  [["am","\u2600\uFE0F Morning","amOn","amTime"],["pm","\uD83C\uDF19 Evening","pmOn","pmTime"]].forEach(function(cfg){
    var row=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}});
    row.appendChild(el("span",{style:{fontSize:"13px",color:"#cbd5e1"}},[cfg[1]]));
    var rr=el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});
    var tinp=el("input",{type:"time",value:S.reminders[cfg[3]],style:{
      background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",
      borderRadius:"6px",color:"#e2e8f0",padding:"4px 8px",fontSize:"13px",colorScheme:"dark"
    }});
    (function(timeKey){tinp.addEventListener("change",function(){S.reminders[timeKey]=this.value;sv("reminders",S.reminders);toast("Reminder saved \u23F0");});})(cfg[3]);
    rr.appendChild(tinp);
    var isOn=S.reminders[cfg[2]];
    rr.appendChild(btn(isOn?"ON":"OFF",(function(toggleKey){
      return function(){S.reminders[toggleKey]=!S.reminders[toggleKey];sv("reminders",S.reminders);
        toast(S.reminders[toggleKey]?"Reminder ON \u23F0":"Reminder OFF");render();};
    })(cfg[2]),{
      padding:"4px 12px",borderRadius:"6px",fontSize:"11px",fontWeight:"700",
      background:isOn?"#10b981":"rgba(255,255,255,0.06)",
      border:"1px solid "+(isOn?"#10b981":"rgba(255,255,255,0.1)"),
      color:isOn?"#fff":"#64748b"
    }));
    row.appendChild(rr);
    card1.appendChild(row);
  });
  card1.appendChild(el("div",{style:{fontSize:"11px",color:"#475569",marginTop:"8px",lineHeight:"1.5"}},
    ["Open in Safari \u2192 Share \u2192 Add to Home Screen for notifications."]));
  app.appendChild(card1);

  // Edit routines
  var card2=el("div",{style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"14px",padding:"16px",marginBottom:"12px"}});
  card2.appendChild(el("div",{style:{fontSize:"14px",fontWeight:"700",color:"#f8fafc",marginBottom:"8px"}},["Edit Routines"]));
  Object.keys(META).forEach(function(k){
    var m=META[k];
    var b=btn(null,(function(type){
      return function(){S.editType=type;S.editPeriod="am";S.editItems=S.routines[type].am.slice();S.newItem="";render();};
    })(k),{
      display:"flex",justifyContent:"space-between",alignItems:"center",
      padding:"10px 12px",borderRadius:"10px",background:"rgba(255,255,255,0.03)",
      border:"1px solid rgba(255,255,255,0.06)",color:"#cbd5e1",fontSize:"13px",
      width:"100%",marginBottom:"6px"
    });
    b.appendChild(el("span",null,[m.icon+" "+m.label]));
    b.appendChild(el("span",{style:{color:"#475569"}},["→"]));
    card2.appendChild(b);
  });
  app.appendChild(card2);

  // Schedule info
  var card3=el("div",{style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"14px",padding:"16px",marginBottom:"12px"}});
  card3.appendChild(el("div",{style:{fontSize:"14px",fontWeight:"700",color:"#f8fafc",marginBottom:"8px"}},["Weekly Pattern"]));
  card3.appendChild(el("div",{style:{fontSize:"12px",color:"#94a3b8",lineHeight:"1.8"}},
    ["Thu \u2192 Prep (no actives)\nFri \u2192 Microneedling (0.25\u20130.5mm)\nSat \u2192 Recovery (HA + Copper Peptide)\nSun\u2013Wed \u2192 Alternate Tret / Azelaic"]));
  card3.lastChild.style.whiteSpace="pre-line";
  app.appendChild(card3);

  app.appendChild(btn("Reset All Progress",function(){
    S.completed={};S.streak={};sv("completed",{});sv("streak",{});toast("All progress reset");render();
  },{
    width:"100%",padding:"12px",borderRadius:"10px",background:"rgba(255,255,255,0.04)",
    border:"1px solid rgba(255,255,255,0.08)",color:"#64748b",fontSize:"13px",textAlign:"center",marginTop:"8px"
  }));
}

// STREAK
function renderStreak(app){
  var streak=getStreak();
  var hdr=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}});
  hdr.appendChild(btn("\u2190 Back",function(){S.screen="calendar";render();},{
    background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",
    borderRadius:"8px",color:"#94a3b8",padding:"8px 14px",fontSize:"13px"
  }));
  hdr.appendChild(el("span",{style:{fontSize:"15px",fontWeight:"700",color:"#f8fafc"}},["🔥 Streak"]));
  app.appendChild(hdr);

  var big=el("div",{style:{textAlign:"center",padding:"24px 0"}});
  big.appendChild(el("div",{style:{fontSize:"56px",fontWeight:"800",color:streak>0?"#ff4757":"#334155"}},[String(streak)]));
  big.appendChild(el("div",{style:{fontSize:"14px",color:"#94a3b8",marginTop:"4px"}},["day streak"]));
  app.appendChild(big);

  var card=el("div",{style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"14px",padding:"16px",marginBottom:"12px"}});
  card.appendChild(el("div",{style:{fontSize:"14px",fontWeight:"700",color:"#f8fafc"}},["Last 30 Days"]));
  var grid=el("div",{style:{display:"grid",gridTemplateColumns:"repeat(10,1fr)",gap:"4px",marginTop:"10px"}});
  for(var i=29;i>=0;i--){
    var d=new Date();d.setDate(d.getDate()-i);
    var k=dkey(d.getFullYear(),d.getMonth(),d.getDate());
    var done=!!S.streak[k];var isTdy=k===todayDk();
    grid.appendChild(el("div",{style:{
      width:"28px",height:"28px",borderRadius:"6px",display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:"9px",fontWeight:"600",
      background:done?"#10b981":"rgba(255,255,255,0.05)",
      border:isTdy?"2px solid #fff":"1px solid rgba(255,255,255,0.08)",
      color:done?"#fff":"#475569"
    }},[String(d.getDate())]));
  }
  card.appendChild(grid);
  app.appendChild(card);

  var card2=el("div",{style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"14px",padding:"16px",textAlign:"center"}});
  card2.appendChild(el("div",{style:{fontSize:"22px",fontWeight:"700",color:"#f8fafc"}},[String(Object.keys(S.streak).length)]));
  card2.appendChild(el("div",{style:{fontSize:"12px",color:"#94a3b8"}},["total days completed"]));
  app.appendChild(card2);
}

// ACTIONS
function toggleStep(dayKey,period,idx){
  var key=dayKey+"-"+period+"-"+idx;
  if(S.completed[key]){delete S.completed[key];}else{S.completed[key]=true;}
  sv("completed",S.completed);checkDayComplete(dayKey);render();
}

function markAllDone(dayKey,period,count){
  for(var i=0;i<count;i++)S.completed[dayKey+"-"+period+"-"+i]=true;
  sv("completed",S.completed);checkDayComplete(dayKey);
  toast(period.toUpperCase()+" routine done! \u2713");render();
}

function checkDayComplete(dayKey){
  var parts=dayKey.split("-");var y=+parts[0],m=+parts[1]-1,d=+parts[2];
  var sch=buildSch(y,m);var type=sch[d];var r=S.routines[type];
  var allAm=r.am.every(function(_,i){return S.completed[dayKey+"-am-"+i];});
  var allPm=r.pm.every(function(_,i){return S.completed[dayKey+"-pm-"+i];});
  if(allAm&&allPm){S.streak[dayKey]=true;sv("streak",S.streak);toast("Day complete! \uD83C\uDF89");}
}

function resetDay(dayKey,type){
  var r=S.routines[type];
  r.am.forEach(function(_,i){delete S.completed[dayKey+"-am-"+i];});
  r.pm.forEach(function(_,i){delete S.completed[dayKey+"-pm-"+i];});
  delete S.streak[dayKey];
  sv("completed",S.completed);sv("streak",S.streak);toast("Day reset");render();
}

function saveRoutineEdit(){
  S.routines[S.editType][S.editPeriod]=S.editItems.slice();
  sv("routines",S.routines);S.editType=null;
  toast("Routine updated! \u2713");render();
}

function prevMonth(){if(S.month===0){S.month=11;S.year--;}else S.month--;S.selDay=null;render();}
function nextMonth(){if(S.month===11){S.month=0;S.year++;}else S.month++;S.selDay=null;render();}
function goToToday(){var t=new Date();S.year=t.getFullYear();S.month=t.getMonth();S.selDay=t.getDate();S.screen="detail";render();}

// NOTIFICATIONS
function checkReminders(){
  if(!("Notification" in window))return;
  if(Notification.permission==="default")Notification.requestPermission();
  if(Notification.permission!=="granted")return;
  var now=new Date();
  var hm=String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
  var sch=buildSch(now.getFullYear(),now.getMonth());
  var type=sch[now.getDate()];var meta=META[type];
  if(S.reminders.amOn&&hm===S.reminders.amTime)
    new Notification("Morning Skincare",{body:meta.icon+" "+meta.label,tag:"sk-am"});
  if(S.reminders.pmOn&&hm===S.reminders.pmTime)
    new Notification("Evening Skincare",{body:meta.icon+" "+meta.label,tag:"sk-pm"});
}

// INIT
initState();render();
setInterval(checkReminders,60000);

})();
</script>
